<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Medical Tracker{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0e1117; --surface: #161b27; --surface2: #1e2535;
      --border: #2a3245; --accent: #4f8ef7; --danger: #e55353;
      --success: #3dd68c; --text: #e2e8f0; --muted: #7a8fa6;
      --mono: "JetBrains Mono", monospace;
    }
    body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 15px; line-height: 1.6; }
    nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; align-items: center; height: 52px; gap: 1.5rem; position: sticky; top: 0; z-index: 100; }
    nav .logo { font-family: var(--mono); font-weight: 600; color: var(--accent); text-decoration: none; font-size: 0.95rem; }
    nav .spacer { flex: 1; }
    nav a.out { color: var(--muted); font-size: 0.85rem; border: 1px solid var(--border); padding: 4px 12px; border-radius: 6px; text-decoration: none; }
    nav a.out:hover { color: var(--text); border-color: var(--muted); }
    main { max-width: 860px; margin: 0 auto; padding: 2.5rem 1.5rem; }
    h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.3rem; }
    h2 { font-size: 1rem; color: var(--muted); font-weight: 400; margin-bottom: 1.5rem; }
    h3 { font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; color: var(--muted); margin-bottom: 0.75rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1.5rem; margin-bottom: 1rem; }
    .btn { display: inline-flex; align-items: center; gap: 5px; padding: 8px 16px; border-radius: 7px; font-size: 0.88rem; font-weight: 500; cursor: pointer; border: none; text-decoration: none; transition: opacity .15s; }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-sm { padding: 5px 11px; font-size: 0.8rem; }
    .flash { padding: 11px 15px; border-radius: 8px; margin-bottom: 1.25rem; font-size: 0.88rem; }
    .flash-success { background: rgba(61,214,140,.1); border: 1px solid rgba(61,214,140,.3); color: var(--success); }
    .flash-danger  { background: rgba(229,83,83,.1);  border: 1px solid rgba(229,83,83,.3);  color: var(--danger); }
    label { display: block; font-size: 0.82rem; font-weight: 500; color: var(--muted); margin-bottom: 0.35rem; }
    input[type="text"], input[type="date"], input[type="time"], input[type="password"], input[type="url"], textarea {
      width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 7px;
      color: var(--text); padding: 8px 11px; font-size: 0.88rem; font-family: inherit; outline: none; resize: vertical;
    }
    input:focus, textarea:focus { border-color: var(--accent); }
    textarea { min-height: 80px; }
    .field { margin-bottom: 1.1rem; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media(max-width:560px){ .row2 { grid-template-columns: 1fr; } }
    hr { border: none; border-top: 1px solid var(--border); margin: 1.75rem 0; }
    .top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1.5rem; gap: 1rem; }
    .actions { display: flex; gap: 0.6rem; flex-wrap: wrap; }
    .back { color: var(--muted); text-decoration: none; font-size: 0.85rem; display: inline-block; margin-bottom: 1.25rem; }
    .back:hover { color: var(--text); }
    .entry-list { list-style: none; }
    .entry-row { display: flex; align-items: flex-start; gap: 1rem; background: var(--surface); border: 1px solid var(--border); border-radius: 9px; padding: 1rem 1.2rem; margin-bottom: 0.5rem; text-decoration: none; color: var(--text); transition: border-color .15s; }
    .entry-row:hover { border-color: var(--accent); }
    .edate { font-family: var(--mono); font-size: 0.8rem; color: var(--accent); min-width: 120px; padding-top: 2px; }
    .etext { font-size: 0.87rem; color: var(--muted); flex: 1; }
    .etext strong { color: var(--text); display: block; margin-bottom: 2px; }
    .ebadges { display: flex; gap: 5px; flex-wrap: wrap; }
    .badge { background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 2px 7px; font-size: 0.75rem; color: var(--muted); }
    .cond-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .cond-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1.2rem; text-decoration: none; color: var(--text); display: block; transition: border-color .15s, transform .1s; }
    .cond-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .cond-card h4 { font-size: 1rem; margin-bottom: 0.35rem; }
    .cond-card .meta { font-size: 0.8rem; color: var(--muted); }
    .cond-card .last { margin-top: 0.7rem; font-size: 0.8rem; color: var(--muted); border-top: 1px solid var(--border); padding-top: 0.7rem; }
    .empty { text-align: center; padding: 3rem 1rem; color: var(--muted); }
    .empty .ic { font-size: 2.5rem; margin-bottom: 1rem; }
    .empty p { margin-bottom: 1.5rem; }
    .rep-row { display: grid; grid-template-columns: 1fr 1fr auto; gap: 0.6rem; margin-bottom: 0.5rem; align-items: end; }
    .rep-row.single { grid-template-columns: 1fr auto; }
    .remove-btn { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 6px; padding: 8px 10px; cursor: pointer; transition: all .15s; align-self: center; }
    .remove-btn:hover { border-color: var(--danger); color: var(--danger); }
    .add-btn { background: none; border: 1px dashed var(--border); color: var(--muted); border-radius: 7px; padding: 6px 14px; cursor: pointer; font-size: 0.83rem; width: 100%; margin-top: 4px; transition: all .15s; }
    .add-btn:hover { border-color: var(--accent); color: var(--accent); }
    .dl { margin-bottom: 1.1rem; }
    .dl .dt { font-size: 0.76rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); font-weight: 600; margin-bottom: 0.25rem; }
    .dl .dd { white-space: pre-wrap; font-size: 0.9rem; line-height: 1.7; }
    table { width: 100%; border-collapse: collapse; font-size: 0.87rem; }
    th { text-align: left; color: var(--muted); font-weight: 500; padding: 6px 8px; border-bottom: 1px solid var(--border); }
    td { padding: 7px 8px; border-bottom: 1px solid var(--border); vertical-align: top; }
    tr:last-child td { border-bottom: none; }
  </style>
</head>
<body>
<nav>
  <a class="logo" href="/">medical.tracker</a>
  <div class="spacer"></div>
  <a class="out" href="/logout">log out</a>
</nav>
<main>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="flash flash-{{ cat }}">{{ msg }}</div>
    {% endfor %}
  {% endwith %}
  {% block content %}{% endblock %}
</main>
</body>
</html>
