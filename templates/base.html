<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Medical Tracker{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0e1117;
      --surface:   #161b27;
      --surface2:  #1e2535;
      --border:    #2a3245;
      --accent:    #4f8ef7;
      --accent2:   #7c5ce8;
      --danger:    #e55353;
      --success:   #3dd68c;
      --warn:      #f5a623;
      --text:      #e2e8f0;
      --muted:     #7a8fa6;
      --font-mono: "JetBrains Mono", "Fira Mono", monospace;
      --font-body: "Inter", system-ui, sans-serif;
      --radius:    10px;
    }

    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap');

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 15px;
      line-height: 1.6;
    }

    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      gap: 2rem;
      height: 56px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    nav .logo {
      font-family: var(--font-mono);
      font-weight: 600;
      font-size: 1rem;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: -0.5px;
    }

    nav .logo span { color: var(--muted); }

    nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.9rem;
      transition: color .15s;
    }

    nav a:hover { color: var(--text); }

    nav .spacer { flex: 1; }

    nav .logout {
      color: var(--muted);
      font-size: 0.85rem;
      border: 1px solid var(--border);
      padding: 4px 12px;
      border-radius: 6px;
      text-decoration: none;
      transition: all .15s;
    }

    nav .logout:hover { border-color: var(--muted); color: var(--text); }

    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 600;
      letter-spacing: -0.5px;
      margin-bottom: 0.4rem;
    }

    h2 {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 1.5rem;
    }

    h3 {
      font-size: 0.95rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: opacity .15s, transform .1s;
    }

    .btn:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    .btn-primary { background: var(--accent); color: #fff; }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-sm { padding: 5px 12px; font-size: 0.82rem; }

    .flash {
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 1.5rem;
      font-size: 0.9rem;
    }

    .flash-success { background: rgba(61,214,140,.12); border: 1px solid rgba(61,214,140,.3); color: var(--success); }
    .flash-danger  { background: rgba(229,83,83,.12);  border: 1px solid rgba(229,83,83,.3);  color: var(--danger); }
    .flash-info    { background: rgba(79,142,247,.12); border: 1px solid rgba(79,142,247,.3); color: var(--accent); }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }

    input[type="text"], input[type="date"], input[type="time"],
    input[type="password"], input[type="url"], textarea, select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      padding: 9px 12px;
      font-size: 0.9rem;
      font-family: var(--font-body);
      outline: none;
      transition: border-color .15s;
      resize: vertical;
    }

    input:focus, textarea:focus, select:focus {
      border-color: var(--accent);
    }

    textarea { min-height: 80px; }

    .field { margin-bottom: 1.2rem; }

    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    @media (max-width: 600px) {
      .field-row { grid-template-columns: 1fr; }
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2rem 0;
    }

    .tag {
      display: inline-block;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 0.78rem;
      color: var(--muted);
    }

    .entry-list { list-style: none; }

    .entry-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      margin-bottom: 0.6rem;
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      text-decoration: none;
      color: var(--text);
      transition: border-color .15s;
    }

    .entry-item:hover { border-color: var(--accent); }

    .entry-date {
      font-family: var(--font-mono);
      font-size: 0.82rem;
      color: var(--accent);
      min-width: 130px;
      padding-top: 2px;
    }

    .entry-preview { font-size: 0.88rem; color: var(--muted); }
    .entry-preview strong { color: var(--text); display: block; margin-bottom: 2px; }

    .entry-badges { margin-left: auto; display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }

    .badge {
      background: var(--surface2);
      border-radius: 4px;
      padding: 2px 7px;
      font-size: 0.75rem;
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
    }

    .repeatable-group { margin-bottom: 0.6rem; }

    .repeatable-row {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 0.6rem;
      align-items: start;
      margin-bottom: 0.5rem;
    }

    .repeatable-row.single-field {
      grid-template-columns: 1fr auto;
    }

    .remove-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 6px;
      padding: 8px 10px;
      cursor: pointer;
      font-size: 0.9rem;
      line-height: 1;
      margin-top: 0;
      align-self: center;
      transition: all .15s;
    }

    .remove-btn:hover { border-color: var(--danger); color: var(--danger); }

    .add-row-btn {
      background: none;
      border: 1px dashed var(--border);
      color: var(--muted);
      border-radius: 7px;
      padding: 6px 14px;
      cursor: pointer;
      font-size: 0.85rem;
      width: 100%;
      margin-top: 4px;
      transition: all .15s;
    }

    .add-row-btn:hover { border-color: var(--accent); color: var(--accent); }

    .empty-state {
      text-align: center;
      padding: 3rem 2rem;
      color: var(--muted);
    }

    .empty-state .icon { font-size: 2.5rem; margin-bottom: 1rem; }
    .empty-state p { margin-bottom: 1.5rem; }

    .detail-field { margin-bottom: 1.25rem; }
    .detail-field .field-label {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 0.3rem;
    }
    .detail-field .field-value {
      color: var(--text);
      white-space: pre-wrap;
      font-size: 0.92rem;
      line-height: 1.7;
    }

    .sub-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
    }

    .sub-table th {
      text-align: left;
      color: var(--muted);
      font-weight: 500;
      padding: 6px 8px;
      border-bottom: 1px solid var(--border);
    }

    .sub-table td {
      padding: 7px 8px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }

    .sub-table tr:last-child td { border-bottom: none; }

    .condition-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .condition-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      text-decoration: none;
      color: var(--text);
      display: block;
      transition: border-color .15s, transform .1s;
    }

    .condition-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .condition-card h4 { font-size: 1rem; margin-bottom: 0.4rem; }
    .condition-card .meta { font-size: 0.82rem; color: var(--muted); }
    .condition-card .last-entry { margin-top: 0.75rem; font-size: 0.82rem; color: var(--muted); border-top: 1px solid var(--border); padding-top: 0.75rem; }

    .page-actions { display: flex; gap: 0.75rem; margin-bottom: 2rem; flex-wrap: wrap; }
  </style>
</head>
<body>

<nav>
  <a class="logo" href="/">medical<span>.tracker</span></a>
  <div class="spacer"></div>
  <a class="logout" href="/logout">log out</a>
</nav>

<main>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="flash flash-{{ cat }}">{{ msg }}</div>
    {% endfor %}
  {% endwith %}

  {% block content %}{% endblock %}
</main>

</body>
</html>
