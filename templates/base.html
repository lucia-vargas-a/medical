<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Medical Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f0f4f8; color: #1a202c; }
    nav { background: #2b4a8c; color: white; padding: 0 24px; display: flex; align-items: center; gap: 20px; height: 54px; }
    nav a { color: white; text-decoration: none; font-size: 14px; padding: 6px 12px; border-radius: 6px; }
    nav a:hover { background: rgba(255,255,255,0.15); }
    nav .brand { font-weight: 700; font-size: 16px; margin-right: 16px; }
    nav .spacer { flex: 1; }
    .container { max-width: 960px; margin: 32px auto; padding: 0 20px; }
    h1 { font-size: 24px; margin-bottom: 20px; color: #1a202c; }
    h2 { font-size: 18px; margin-bottom: 14px; color: #2d3748; }
    .card { background: white; border-radius: 10px; padding: 20px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .btn { display: inline-block; padding: 9px 20px; border-radius: 7px; border: none; font-size: 14px; font-weight: 500; cursor: pointer; text-decoration: none; }
    .btn-primary { background: #2b4a8c; color: white; }
    .btn-primary:hover { background: #1e3a7a; }
    .btn-secondary { background: #e2e8f0; color: #2d3748; }
    .btn-secondary:hover { background: #cbd5e0; }
    .btn-sm { padding: 5px 12px; font-size: 12px; }
    .alert { padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; }
    .alert-danger { background: #fff5f5; border: 1px solid #fed7d7; color: #c53030; }
    .alert-success { background: #f0fff4; border: 1px solid #c6f6d5; color: #276749; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #4a5568; margin-bottom: 5px; }
    input[type=text], input[type=date], input[type=number], input[type=password],
    input[type=email], select, textarea {
      width: 100%; padding: 9px 12px; border: 1px solid #cbd5e0; border-radius: 7px;
      font-size: 14px; color: #1a202c; background: white;
    }
    input:focus, select:focus, textarea:focus { outline: none; border-color: #2b4a8c; box-shadow: 0 0 0 3px rgba(43,74,140,0.1); }
    textarea { resize: vertical; min-height: 80px; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
    @media(max-width:600px) { .grid2, .grid3 { grid-template-columns: 1fr; } }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th { text-align: left; padding: 10px 12px; background: #edf2f7; color: #4a5568; font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; }
    td { padding: 10px 12px; border-bottom: 1px solid #edf2f7; }
    tr:last-child td { border-bottom: none; }
    .badge { display: inline-block; padding: 2px 10px; border-radius: 99px; font-size: 11px; font-weight: 600; }
    .badge-green { background: #c6f6d5; color: #276749; }
    .badge-blue { background: #bee3f8; color: #2c5282; }
    .badge-orange { background: #feebc8; color: #9c4221; }
    .badge-red { background: #fed7d7; color: #c53030; }
    .badge-gray { background: #edf2f7; color: #4a5568; }
    .range-row { display: flex; align-items: center; gap: 12px; }
    .range-row input[type=range] { flex: 1; accent-color: #2b4a8c; }
    .range-val { min-width: 28px; text-align: center; font-weight: 700; color: #2b4a8c; font-size: 15px; }
    .privacy-note { background: #fffbeb; border: 1px solid #f6e05e; border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #744210; margin-bottom: 20px; }
  </style>
</head>
<body>
  <nav>
    <span class="brand">🏥 Medical Tracker</span>
    <a href="/">Dashboard</a>
    <a href="/conditions">Conditions</a>
    <a href="/log/add">Log Symptom</a>
    <a href="/treatments/add">Add Treatment</a>
    <a href="/appointments/add">Add Appointment</a>
    <a href="/doctors">Doctors</a>
    <span class="spacer"></span>
    <a href="/logout">Logout</a>
  </nav>

  <div class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    {% block content %}{% endblock %}
  </div>

  <script>
    // Live range value display
    document.querySelectorAll('input[type=range]').forEach(r => {
      const display = document.getElementById(r.id + '_val');
      if (display) display.textContent = r.value;
      r.addEventListener('input', () => {
        if (display) display.textContent = r.value;
      });
    });
  </script>
</body>
</html>
