{% extends "base.html" %}
{% block title %}New condition{% endblock %}
{% block content %}

<div style="margin-bottom:1.5rem">
  <a href="/" style="color:var(--muted);text-decoration:none;font-size:0.88rem">← Back</a>
</div>

<h1 style="margin-bottom:0.5rem">New condition</h1>
<p style="color:var(--muted);font-size:0.9rem;margin-bottom:2rem">Enter the condition you want to start tracking over time.</p>

<div class="card">
  <form method="POST">

    <div class="field">
      <label>Condition name *</label>
      <input type="text" name="name" placeholder="e.g. Lower back pain, Psoriasis, Migraine…"
             value="{{ form.name if form else '' }}" autofocus required>
    </div>

    <div class="field">
      <label>Initial notes <span style="color:var(--border)">optional</span></label>
      <textarea name="notes" placeholder="Any context you want to remember about this condition…">{{ form.notes if form else '' }}</textarea>
    </div>

    <div style="display:flex;gap:0.75rem">
      <button class="btn btn-primary" type="submit">Create condition</button>
      <a class="btn btn-secondary" href="/">Cancel</a>
    </div>

  </form>
</div>

{% endblock %}
