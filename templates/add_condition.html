{% extends "base.html" %}
{% block title %}New condition{% endblock %}
{% block content %}
<a class="back" href="/">← Back</a>
<h1>New condition</h1>
<h2>Enter the name of the condition you want to track over time.</h2>
<div class="card">
  <form method="POST">
    <div class="field">
      <label>Condition name *</label>
      <input type="text" name="name" placeholder="e.g. Lower back pain, Psoriasis, Migraine…" autofocus required>
    </div>
    <div class="field">
      <label>Notes (optional)</label>
      <textarea name="notes" placeholder="Any initial context…"></textarea>
    </div>
    <div class="actions">
      <button class="btn btn-primary" type="submit">Create</button>
      <a class="btn btn-secondary" href="/">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
