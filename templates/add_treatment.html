{% extends "base.html" %}
{% block content %}
<h1>Log Treatment</h1>
<div class="privacy-note">🔒 No personal info in any field.</div>
<div class="card">
<form method="POST">
  <div class="grid2">
    <div class="form-group">
      <label>Condition *</label>
      <select name="condition_id" required>
        <option value="">— select —</option>
        {% for c in conditions %}<option value="{{ c.id }}">#{{ c.id }} — {{ c.name }}</option>{% endfor %}
      </select>
    </div>
    <div class="form-group">
      <label>Treatment Type *</label>
      <select name="treatment_type" required>
        <optgroup label="General">
          <option value="medication">Medication</option>
          <option value="physiotherapy">Physiotherapy</option>
          <option value="injection">Injection</option>
          <option value="surgery">Surgery</option>
          <option value="massage">Massage</option>
          <option value="acupuncture">Acupuncture</option>
          <option value="lifestyle">Lifestyle Change</option>
          <option value="rest">Rest</option>
        </optgroup>
        <optgroup label="Dental">
          <option value="dental_cleaning">Cleaning / Descaling</option>
          <option value="filling">Filling</option>
          <option value="root_canal">Root Canal</option>
          <option value="crown">Crown</option>
          <option value="extraction">Extraction</option>
          <option value="implant">Implant</option>
          <option value="brace_aligner">Brace / Aligner</option>
          <option value="dental_antibiotics">Antibiotics (Dental)</option>
        </optgroup>
        <option value="other">Other</option>
      </select>
    </div>
    <div class="form-group">
      <label>Treatment / Medication Name *</label>
      <input type="text" name="name" placeholder="e.g. Ibuprofen, Physiotherapy, Root Canal — Tooth 14" required>
    </div>
    <div class="form-group">
      <label>Dosage / Details</label>
      <input type="text" name="dosage_details" placeholder="e.g. 400mg twice daily / 2x per week / composite filling">
    </div>
    <div class="form-group">
      <label>Active Ingredient &amp; Dose</label>
      <input type="text" name="active_ingredient" placeholder="e.g. Naproxen sodium 500mg">
    </div>
    <div class="form-group">
      <label>Prescribed by</label>
      <select name="doctor_id">
        <option value="">— none —</option>
        {% for d in doctors %}<option value="{{ d.id }}">Doctor {{ d.id }} ({{ d.specialty }})</option>{% endfor %}
      </select>
    </div>
    <div class="form-group">
      <label>Linked Appointment</label>
      <select name="appointment_id">
        <option value="">— none —</option>
        {% for a in appointments %}<option value="{{ a.id }}">#{{ a.id }} — {{ a.appointment_date }} (Condition {{ a.condition_id }})</option>{% endfor %}
      </select>
    </div>
    <div class="form-group">
      <label>Start Date</label>
      <input type="date" name="start_date">
    </div>
    <div class="form-group">
      <label>End Date</label>
      <input type="date" name="end_date">
    </div>
  </div>

  <div class="form-group">
    <label><input type="checkbox" name="still_ongoing" style="width:auto;margin-right:6px;">Still ongoing</label>
  </div>
  <div class="form-group">
    <label>Outcome</label>
    <select name="outcome">
      <option value="">— not yet evaluated —</option>
      <option value="helped">Helped</option>
      <option value="partial_relief">Partial Relief</option>
      <option value="no_relief">No Relief</option>
      <option value="made_worse">Made Things Worse</option>
      <option value="stopped_side_effects">Stopped — Side Effects</option>
      <option value="ongoing">Ongoing / Too Early to Tell</option>
    </select>
  </div>
  <div class="form-group">
    <label>Side Effects (if any)</label>
    <textarea name="side_effects" placeholder="e.g. Severe headache and nausea after 3 days. Stopped taking."></textarea>
  </div>
  <div class="form-group">
    <label>Additional Notes</label>
    <textarea name="notes" placeholder="e.g. Pain went from 8 to 5 after two weeks. Sensitivity to cold improved after filling."></textarea>
  </div>
  <button type="submit" class="btn btn-primary">Save Treatment</button>
  <a href="/" class="btn btn-secondary" style="margin-left:10px;">Cancel</a>
</form>
</div>
{% endblock %}
